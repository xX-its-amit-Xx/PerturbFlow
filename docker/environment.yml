name: perturbflow
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python=3.11
  - pip
  # Core scientific stack
  - numpy>=1.26
  - pandas>=2.1
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.8
  - seaborn>=0.13
  - pyarrow>=14
  - pyyaml>=6.0
  - jinja2>=3.1
  - click>=8.1
  - tqdm>=4.66
  # Single-cell
  - anndata>=0.10
  - scanpy>=1.10
  - leidenalg>=0.10
  - python-igraph>=0.11
  - umap-learn>=0.5
  # Perturb-seq specific (most reliable via pip into the conda env)
  - pip:
      - pertpy>=0.8
      - pydeseq2>=0.4
      - decoupler>=1.6
      - omnipath>=1.0
      - snakemake>=8
