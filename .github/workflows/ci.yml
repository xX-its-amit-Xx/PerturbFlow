name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          # Cache by pyproject.toml since we don't ship a uv.lock.
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint deps
        run: uv pip install --system "ruff>=0.5" "mypy>=1.8" "types-PyYAML" "pandas-stubs"
      - name: ruff check
        run: ruff check src/ tests/
      - name: ruff format check
        run: ruff format --check src/ tests/
      - name: Install minimal runtime deps for mypy
        run: |
          uv pip install --system \
            "anndata>=0.10" "scanpy>=1.10" "numpy>=1.26,<3" "pandas>=2.1" \
            "scipy>=1.11" "scikit-learn>=1.3" "matplotlib>=3.8" "seaborn>=0.13" \
            "pyyaml" "jinja2" "click" "tqdm" "pyarrow"
      - name: mypy
        run: mypy src/perturbflow
        continue-on-error: true  # warn-only on initial release; tighten later

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          # Cache by pyproject.toml since we don't ship a uv.lock.
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: |
          uv pip install --system -e ".[all,dev]"
      - name: Run tests
        run: pytest tests/ --tb=short -v
        env:
          MPLBACKEND: Agg
          NUMBA_CACHE_DIR: /tmp/numba_cache
      - name: Upload coverage XML
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    # Only build the image on main; PRs from forks would otherwise fail without
    # access to registry credentials. We push from a separate release workflow.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: perturbflow:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
